<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Electricity Billing</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 22px;
        }
        input {
            width: 90%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-color: #3b82f6;
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2563eb;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            color: #0f172a;
            font-size: 16px;
            display: none;
        }
        .error {
            color: #ef4444;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>⚡ Smart Electricity Bill</h2>
        
        <input type="number" id="unitInput" placeholder="Enter Units (e.g., 150)">
        
        <button onclick="calculateBill()">Calculate Bill</button>
        
        <div id="outputMessage" class="error"></div>
        <div id="billResult" class="result-box"></div>
    </div>

    <script>
        function calculateBill() {
            let unitBox = document.getElementById("unitInput").value;
            let units = parseInt(unitBox);
            let billAmount = 0.0;
            
            let outputMessage = document.getElementById("outputMessage");
            let billResult = document.getElementById("billResult");

            // Har baar naya bill calculate karne se pehle purana clear kar do
            outputMessage.innerHTML = "";
            billResult.style.display = "none";

            // Agar user ne khali box pe click kar diya ya galat number dala
            if (unitBox === "" || isNaN(units) || units < 0) {
                outputMessage.innerHTML = "❌ Please enter a valid positive number.";
                return;
            }

            // Core Logic
            if (units <= 100) {
                billAmount = units * 5.0; 
            } else if (units <= 200) {
                billAmount = (100 * 5.0) + ((units - 100) * 7.0); 
            } else {
                billAmount = (100 * 5.0) + (100 * 7.0) + ((units - 200) * 10.0); 
            }

            // Screen par show karo
            billResult.innerHTML = `Total Units: <strong>${units}</strong> <br> Total Amount: <strong style="color:#16a085; font-size:22px;">₹${billAmount}</strong>`;
            billResult.style.display = "block";
        }

        // Enter key dabane par bhi bill nikalne ka feature
        document.getElementById("unitInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault(); // Page refresh hone se rokta hai
                calculateBill(); // Function ko call kar deta hai
            }
        });
    </script>

</body>
</html>
