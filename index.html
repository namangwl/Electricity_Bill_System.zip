<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Power Bill Estimator</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .bill-card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-top: 50px; }
        .header-bg { background: #0d6efd; color: white; padding: 20px; border-radius: 12px 12px 0 0; margin: -30px -30px 20px -30px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="bill-card">
                    <div class="header-bg text-center">
                        <h3 class="m-0">⚡ Power Bill Estimator</h3>
                        <p class="mb-0 text-white-50">EE Branch Mini Project</p>
                    </div>
                    
                    <form>
                        <div class="mb-3">
                            <label class="form-label text-muted">Customer Name</label>
                            <input type="text" class="form-control" placeholder="Enter name">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted">Units Consumed (kWh)</label>
                            <input type="number" class="form-control" placeholder="e.g. 250">
                        </div>
                        <button type="button" class="btn btn-primary w-100 py-2">Calculate Bill Estimation</button>
                    </form>

                    <hr class="my-4">
                    
                    <div class="alert alert-info text-center" role="alert">
                        <strong>Logic runs in Java!</strong><br> 
                        (Check BillCalculator.java for the core loop & if-else logic)
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
